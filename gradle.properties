# Point the Gradle JVM at our custom truststore that includes the Zscaler CA
# (required on networks with SSL inspection / corporate proxy)
org.gradle.jvmargs=-Xmx2g -Djavax.net.ssl.trustStore=/tmp/gradle-cacerts.jks -Djavax.net.ssl.trustStorePassword=changeit

# Use the system ANDROID_HOME
android.useAndroidX=true

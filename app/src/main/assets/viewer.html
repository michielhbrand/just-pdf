<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    width: 100%;
    height: 100%;
    -webkit-user-select: text;
    user-select: text;
  }

  #outer {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0;
  }

  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .page-wrapper canvas {
    display: block;
    pointer-events: none;
  }

  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    overflow: visible;
    line-height: 1;
    z-index: 2;
    pointer-events: auto;
    -webkit-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }

  .textLayer span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    -webkit-user-select: text;
    user-select: text;
  }

  /* Suppress native ::selection — we draw our own on canvas */
  .textLayer span::selection {
    background: transparent;
    color: transparent;
  }

  /* Highlight overlay canvas — above text layer, no pointer events */
  .highlightLayer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 3;
  }

  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="outer">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="container"></div>
</div>

<script>
(async function () {
  let pdfjsLib;
  try {
    pdfjsLib = await import('./pdf.mjs');
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Failed to load pdf.js: ' + e.message;
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  const HIGHLIGHT_COLOR = 'rgba(0, 120, 255, 0.35)';

  // Reusable off-screen canvas for text measurement.
  const measureCanvas = document.createElement('canvas');
  const measureCtx    = measureCanvas.getContext('2d');

  // ── Canvas-drawn selection highlight ─────────────────────────────────────
  //
  // Strategy:
  //   1. Walk the selection Range text-node by text-node.
  //   2. For each selected span, call span.getBoundingClientRect() — this
  //      returns the VISUAL rect (post-scaleX) in viewport coordinates.
  //   3. For partial selections (start/end chars), measure the fractional
  //      x-offset within the span using measureText with the span's
  //      COMPUTED font (getComputedStyle resolves the calc() font-size).
  //      The fraction is then applied to the visual width from getBCR.
  //   4. Translate viewport coords → page-wrapper-local coords by
  //      subtracting the wrapper's getBoundingClientRect().
  //   5. Draw on the per-page highlightLayer canvas (CSS-pixel 1:1).
  //
  // This avoids all the percentage/calc parsing issues and works correctly
  // regardless of scaleX value.

  /**
   * Extract the effective scaleX from a span's inline transform style.
   * pdf.js sets transform as e.g. "scaleX(1.23) scale(0.5)" or just "scaleX(1.23)".
   * The scale(1/minFontSize) part is a uniform scale that does NOT affect the
   * x-fraction calculation (it cancels in numerator/denominator).
   * We only need scaleX for converting layout-space x-advances to visual-space.
   */
  function getSpanScaleX(span) {
    const t = span.style.transform || '';
    const m = t.match(/scaleX\(([\d.eE+\-]+)\)/);
    return m ? parseFloat(m[1]) : 1;
  }

  /**
   * Given a span, startOffset, endOffset (character indices into span.textContent),
   * return { x, y, w, h } in page-wrapper-local CSS pixels.
   *
   * Strategy:
   *   - span.getBoundingClientRect() gives the visual (post-transform) rect.
   *   - For partial selections, we need the x-offset of startOff and endOff
   *     within the span. We compute this using measureText in the span's font,
   *     but we must use the SAME font size that pdf.js used internally.
   *
   *   pdf.js #layout measures at: fontSize * this.#scale  px
   *   where fontSize = textDivProperties.fontSize (= fontHeight, the raw value)
   *   and this.#scale = viewport.scale * dpr = (scale/dpr)*dpr = scale.
   *
   *   getComputedStyle(span).fontSize resolves to: scale * minFontSize * fontHeight px
   *   (because divStyle.fontSize = calc(var(--scale-factor) * minFontSize * fontHeight px))
   *
   *   So getComputedStyle gives a font size that is minFontSize× too large.
   *   BUT since we only use measureText for ratios (startW/fullW), the font size
   *   cancels out — any consistent font size gives the same ratio.
   *
   *   The remaining issue: the browser may render the span with a DIFFERENT
   *   effective font size due to the scale(1/minFontSize) transform. The layout
   *   box width (pre-scaleX) = measureText(text, fontSize*minFontSize) / scaleX_internal.
   *   The visual width = layout_width * scaleX (from getBCR).
   *
   *   So: visual_x_at_char_n = vr.left + (measureText(text[0..n]) / measureText(text)) * vr.width
   *   This is correct as long as measureText ratios match the browser's rendering ratios,
   *   which holds when using the same font family and any consistent size.
   */
  function spanRect(span, startOff, endOff, wrapperRect) {
    const text  = span.textContent;
    const total = text.length;
    if (total === 0 || startOff >= endOff) return null;

    // Visual bounding rect of the entire span (post-transform, viewport coords).
    const vr = span.getBoundingClientRect();
    if (vr.width === 0 || vr.height === 0) return null;

    const x0 = vr.left - wrapperRect.left;
    const y0 = vr.top  - wrapperRect.top;

    // Full span selected — use the entire visual rect.
    if (startOff === 0 && endOff === total) {
      return { x: x0, y: y0, w: vr.width, h: vr.height };
    }

    // Partial selection: compute x-fractions via measureText.
    // Use the span's computed font (any consistent size works for ratios).
    const cs = window.getComputedStyle(span);
    measureCtx.font = `${cs.fontStyle} ${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;

    const fullW  = measureCtx.measureText(text).width;
    if (fullW <= 0) return { x: x0, y: y0, w: vr.width, h: vr.height };

    const startW = startOff > 0 ? measureCtx.measureText(text.slice(0, startOff)).width : 0;
    const endW   = endOff < total ? measureCtx.measureText(text.slice(0, endOff)).width : fullW;

    const xStart = x0 + (startW / fullW) * vr.width;
    const xEnd   = x0 + (endW   / fullW) * vr.width;

    return { x: xStart, y: y0, w: xEnd - xStart, h: vr.height };
  }

  function clearHighlights() {
    const layers = document.querySelectorAll('.highlightLayer');
    for (const c of layers) {
      c.getContext('2d').clearRect(0, 0, c.width, c.height);
    }
  }

  function drawHighlight() {
    clearHighlights();

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

    const range = sel.getRangeAt(0);

    // Find the textLayer containing the selection start.
    const startNode = range.startContainer;
    const startEl   = startNode.nodeType === Node.TEXT_NODE
      ? startNode.parentElement : startNode;
    const textLayer = startEl.closest('.textLayer');
    if (!textLayer) return;

    const wrapper     = textLayer.closest('.page-wrapper');
    if (!wrapper) return;
    const hlCanvas    = wrapper.querySelector('.highlightLayer');
    if (!hlCanvas) return;
    const wrapperRect = wrapper.getBoundingClientRect();

    const ctx = hlCanvas.getContext('2d');
    ctx.fillStyle = HIGHLIGHT_COLOR;

    // Walk all text nodes in the textLayer and draw rects for those that
    // fall within the selection range.
    // range.intersectsNode() tells us if a node overlaps the range at all.
    // Then we clamp offsets to the range boundaries.
    const walker = document.createTreeWalker(textLayer, NodeFilter.SHOW_TEXT, null);
    let node;
    while ((node = walker.nextNode())) {
      // Skip nodes that don't overlap the range.
      if (!range.intersectsNode(node)) continue;

      const span = node.parentElement;
      if (!span) continue;

      const text     = node.textContent;
      const startOff = (node === range.startContainer) ? range.startOffset : 0;
      const endOff   = (node === range.endContainer)   ? range.endOffset   : text.length;

      if (startOff >= endOff) continue;

      const r = spanRect(span, startOff, endOff, wrapperRect);
      if (r && r.w > 0) {
        ctx.fillRect(r.x, r.y, r.w, r.h);
      }
    }
  }

  document.addEventListener('selectionchange', drawHighlight);

  // ─────────────────────────────────────────────────────────────────────────

  window.loadPdf = async function (fileUrl) {
    window.scrollTo(0, 0);
    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const dpr           = window.devicePixelRatio || 1;
      const viewportWidth = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale    = viewportWidth / viewport.width;
        const sv       = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = sv.width  + 'px';
        wrapper.style.height = sv.height + 'px';

        // ── PDF canvas (hi-DPI) ──
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = Math.floor(sv.width  * dpr);
        canvas.height = Math.floor(sv.height * dpr);
        canvas.style.width  = sv.width  + 'px';
        canvas.style.height = sv.height + 'px';
        await page.render({
          canvasContext: ctx,
          viewport: page.getViewport({ scale: scale * dpr }),
        }).promise;

        // ── Text layer ──
        // viewport.scale = scale/dpr → TextLayer#scale = (scale/dpr)*dpr = scale
        // so scaleX values are correct for CSS-pixel measurements.
        // --scale-factor = scale so setLayerDimensions sizes the container correctly.
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.setProperty('--scale-factor', String(scale));

        const textContent  = await page.getTextContent();
        const textLayerVp  = page.getViewport({ scale: scale / dpr });
        const textLayer    = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: textLayerVp,
        });
        await textLayer.render();

        // ── Highlight overlay canvas (CSS-pixel size, 1:1) ──
        // No dpr multiplication: canvas coords must match CSS-pixel viewport coords
        // returned by getBoundingClientRect() minus wrapperRect.
        const hlCanvas = document.createElement('canvas');
        hlCanvas.className    = 'highlightLayer';
        hlCanvas.width        = Math.floor(sv.width);
        hlCanvas.height       = Math.floor(sv.height);
        hlCanvas.style.width  = sv.width  + 'px';
        hlCanvas.style.height = sv.height + 'px';

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        wrapper.appendChild(hlCanvas);
        container.appendChild(wrapper);
      }

      if (window.Android) window.Android.onPdfLoaded(pdf.numPages);

    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) window.Android.onPdfError(err.message || String(err));
    }
  };

  if (window.Android) window.Android.onViewerReady();
})();
</script>
</body>
</html>

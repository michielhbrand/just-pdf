<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    width: 100%;
    height: 100%;
    /* Enable native text selection throughout */
    -webkit-user-select: text;
    user-select: text;
  }

  #outer {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0;
  }

  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Canvas sits behind the text layer */
  .page-wrapper canvas {
    display: block;
    /* pointer-events:none so touches reach the selectable text layer */
    pointer-events: none;
  }

  /* ── Text layer ── */
  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    /* width/height are set by pdf.js setLayerDimensions via --scale-factor */
    overflow: visible;
    line-height: 1;
    z-index: 2;
    pointer-events: auto;
    /* Enable native text selection */
    -webkit-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }

  .textLayer span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    -webkit-user-select: text;
    user-select: text;
  }

  /* Suppress the native ::selection highlight — we draw our own on canvas */
  .textLayer span::selection {
    background: transparent;
    color: transparent;
  }

  /* ── Highlight overlay canvas ── */
  .highlightLayer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 3;
  }

  /* ── Loading / error ── */
  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="outer">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="container"></div>
</div>

<script>
(async function () {
  let pdfjsLib;
  try {
    pdfjsLib = await import('./pdf.mjs');
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Failed to load pdf.js: ' + e.message;
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  // Array of { canvas, ctx } for each page's highlight overlay.
  // Rebuilt every time a new PDF is loaded.
  const highlightLayers = [];

  // ── Canvas-drawn selection highlight ──────────────────────────────────────
  // We suppress the native ::selection background and instead draw blue
  // rectangles on a per-page overlay canvas.  Range.getClientRects() returns
  // the *actual* visual bounding boxes (post-scaleX transform), so the
  // highlight aligns perfectly with the rendered text.

  const HIGHLIGHT_COLOR = 'rgba(0, 120, 255, 0.35)';

  function clearHighlights() {
    for (const { canvas, ctx } of highlightLayers) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function drawHighlight() {
    clearHighlights();

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

    const range = sel.getRangeAt(0);
    const rects = range.getClientRects();
    if (!rects || rects.length === 0) return;

    for (const { canvas, ctx } of highlightLayers) {
      // Get the canvas's position in the viewport (CSS pixels).
      const canvasRect = canvas.getBoundingClientRect();

      // The canvas logical size equals its CSS size (1:1 mapping).
      // We draw directly in CSS-pixel coordinates.
      let drew = false;
      for (const r of rects) {
        // Only draw rects that overlap this canvas.
        if (r.right  < canvasRect.left   ||
            r.left   > canvasRect.right  ||
            r.bottom < canvasRect.top    ||
            r.top    > canvasRect.bottom) {
          continue;
        }
        // Translate from viewport coords to canvas-local coords.
        const x = r.left   - canvasRect.left;
        const y = r.top    - canvasRect.top;
        const w = r.width;
        const h = r.height;
        if (!drew) {
          ctx.fillStyle = HIGHLIGHT_COLOR;
          drew = true;
        }
        ctx.fillRect(x, y, w, h);
      }
    }
  }

  // Listen for selection changes on the whole document.
  document.addEventListener('selectionchange', drawHighlight);

  // ─────────────────────────────────────────────────────────────────────────

  window.loadPdf = async function (fileUrl) {
    window.scrollTo(0, 0);
    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';
    highlightLayers.length  = 0;   // clear previous page canvases

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const dpr           = window.devicePixelRatio || 1;
      const viewportWidth = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale    = viewportWidth / viewport.width;
        const sv       = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = sv.width  + 'px';
        wrapper.style.height = sv.height + 'px';

        // ── PDF canvas (hi-DPI) ──
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = Math.floor(sv.width  * dpr);
        canvas.height = Math.floor(sv.height * dpr);
        canvas.style.width  = sv.width  + 'px';
        canvas.style.height = sv.height + 'px';
        await page.render({
          canvasContext: ctx,
          viewport: page.getViewport({ scale: scale * dpr }),
        }).promise;

        // ── Text layer ──
        // Pass viewport.scale = scale/dpr to TextLayer so its internal
        // this.#scale = (scale/dpr)*dpr = scale (correct for CSS-pixel measurements).
        // This gives accurate scaleX values matching the canvas-rendered text widths.
        // We still set --scale-factor = scale manually so setLayerDimensions sizes
        // the container correctly at scale * pageWidth CSS pixels.
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.setProperty('--scale-factor', String(scale));

        const textContent  = await page.getTextContent();
        const textLayerVp  = page.getViewport({ scale: scale / dpr });
        const textLayer    = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: textLayerVp,
        });
        await textLayer.render();

        // ── Highlight overlay canvas (CSS-pixel size, 1:1) ──
        // We intentionally do NOT multiply by dpr here: the canvas coordinate
        // space must match the CSS-pixel coordinates returned by getClientRects().
        const hlCanvas = document.createElement('canvas');
        hlCanvas.className    = 'highlightLayer';
        hlCanvas.width        = Math.floor(sv.width);
        hlCanvas.height       = Math.floor(sv.height);
        hlCanvas.style.width  = sv.width  + 'px';
        hlCanvas.style.height = sv.height + 'px';
        const hlCtx = hlCanvas.getContext('2d');

        highlightLayers.push({ canvas: hlCanvas, ctx: hlCtx });

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        wrapper.appendChild(hlCanvas);
        container.appendChild(wrapper);
      }

      if (window.Android) window.Android.onPdfLoaded(pdf.numPages);

    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) window.Android.onPdfError(err.message || String(err));
    }
  };

  if (window.Android) window.Android.onViewerReady();
})();
</script>
</body>
</html>

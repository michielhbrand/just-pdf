<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    width: 100%;
    /* IMPORTANT: fixed height so flexbox centering works */
    height: 100%;
    -webkit-user-select: text;
    user-select: text;
  }

  /*
   * Outer wrapper: full viewport height, centres #container vertically
   * when content is shorter than the screen (single-page PDFs).
   * When content is taller, it simply grows and scrolls normally.
   */
  #outer {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Inner container holds the page wrappers */
  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0; /* bottom padding clears the toolbar */
  }

  /* ── Page wrapper ── */
  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  /* Canvas sits behind the text layer — pointer-events:none so touches
     pass through to the selectable text layer above it */
  .page-wrapper canvas {
    display: block;
    pointer-events: none;
  }

  /* ── Text layer (pdf.js) ── */
  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    line-height: 1;
    z-index: 2;
    pointer-events: auto;
    -webkit-user-select: text;
    user-select: text;
    /* Prevent callout popup from blocking selection start */
    -webkit-touch-callout: default;
  }

  .textLayer span,
  .textLayer br {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    -webkit-user-select: text;
    user-select: text;
  }

  .textLayer span::selection,
  .textLayer ::selection {
    background: rgba(0, 120, 255, 0.35);
    color: transparent;
  }

  /* ── Loading / error ── */
  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="outer">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="container"></div>
</div>

<script type="module">
  import * as pdfjsLib from './pdf.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const outer     = document.getElementById('outer');
  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  window.loadPdf = async function(fileUrl) {
    // Reset scroll and zoom before loading new document
    window.scrollTo(0, 0);
    document.documentElement.style.zoom = '';

    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const dpr           = window.devicePixelRatio || 1;
      const viewportWidth = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });

        const scale          = viewportWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = scaledViewport.width  + 'px';
        wrapper.style.height = scaledViewport.height + 'px';

        // ── Canvas (hi-DPI) ──
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = Math.floor(scaledViewport.width  * dpr);
        canvas.height = Math.floor(scaledViewport.height * dpr);
        canvas.style.width  = scaledViewport.width  + 'px';
        canvas.style.height = scaledViewport.height + 'px';

        await page.render({
          canvasContext: ctx,
          viewport: page.getViewport({ scale: scale * dpr }),
        }).promise;

        // ── Text layer ──
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';

        const textContent = await page.getTextContent();
        const textLayer   = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: scaledViewport,
        });
        await textLayer.render();

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        container.appendChild(wrapper);
      }

      if (window.Android) window.Android.onPdfLoaded(pdf.numPages);

    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) window.Android.onPdfError(err.message || String(err));
    }
  };

  if (window.Android) window.Android.onViewerReady();
</script>
</body>
</html>

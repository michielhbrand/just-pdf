<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    width: 100%;
    height: 100%;
    /* Enable native text selection throughout */
    -webkit-user-select: text;
    user-select: text;
  }

  #outer {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0;
  }

  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Canvas sits behind the text layer */
  .page-wrapper canvas {
    display: block;
    /* pointer-events:none so touches reach the selectable text layer */
    pointer-events: none;
  }

  /* ── Text layer ── */
  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    /* width/height are set by pdf.js setLayerDimensions via --scale-factor */
    overflow: visible;
    line-height: 1;
    z-index: 2;
    pointer-events: auto;
    /* Enable native text selection */
    -webkit-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }

  .textLayer span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    -webkit-user-select: text;
    user-select: text;
  }

  /* Native selection highlight */
  .textLayer span::selection {
    background: rgba(0, 120, 255, 0.35);
    color: transparent;
  }

  /* ── Loading / error ── */
  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="outer">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="container"></div>
</div>

<script>
(async function () {
  let pdfjsLib;
  try {
    pdfjsLib = await import('./pdf.mjs');
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Failed to load pdf.js: ' + e.message;
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  window.loadPdf = async function (fileUrl) {
    window.scrollTo(0, 0);
    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const dpr           = window.devicePixelRatio || 1;
      const viewportWidth = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale    = viewportWidth / viewport.width;
        const sv       = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = sv.width  + 'px';
        wrapper.style.height = sv.height + 'px';

        // ── Canvas (hi-DPI) ──
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = Math.floor(sv.width  * dpr);
        canvas.height = Math.floor(sv.height * dpr);
        canvas.style.width  = sv.width  + 'px';
        canvas.style.height = sv.height + 'px';
        await page.render({
          canvasContext: ctx,
          viewport: page.getViewport({ scale: scale * dpr }),
        }).promise;

        // ── Text layer ──
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.setProperty('--scale-factor', String(scale));

        const textContent = await page.getTextContent();
        const textLayer   = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: sv,
        });
        await textLayer.render();

        // Fix span hit-test boxes so selection handles land on word boundaries.
        //
        // pdf.js applies a CSS scaleX() transform to each span to stretch it to match
        // the canvas-rendered text width. scaleX changes the visual size but NOT the
        // layout box — the browser places selection handles at the visual edges, but
        // touch targets use the layout box. When scaleX != 1 these diverge.
        //
        // Fix: for every span that has a scaleX transform, measure its actual rendered
        // width via getBoundingClientRect(), then set that as an explicit CSS width and
        // remove the scaleX so layout box == visual bounds == correct touch target.
        //
        // We must append the div to the DOM first so getBoundingClientRect() works.
        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        container.appendChild(wrapper);

        for (const span of textLayerDiv.querySelectorAll('span')) {
          const t = span.style.transform;
          if (!t || !t.includes('scaleX')) continue;
          const visualWidth = span.getBoundingClientRect().width;
          if (visualWidth > 0) {
            span.style.width = visualWidth + 'px';
            span.style.transform = t.replace(/scaleX\([^)]*\)\s*/g, '').trim();
          }
        }
      }

      if (window.Android) window.Android.onPdfLoaded(pdf.numPages);

    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) window.Android.onPdfError(err.message || String(err));
    }
  };

  if (window.Android) window.Android.onViewerReady();
})();
</script>
</body>
</html>

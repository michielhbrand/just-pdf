<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #1a1a1a;
    width: 100%;
    height: 100%;
    -webkit-user-select: text;
    user-select: text;
  }

  #outer {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0;
  }

  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .page-wrapper canvas {
    display: block;
    pointer-events: none;
  }

  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    overflow: visible;
    line-height: 1;
    z-index: 2;
    pointer-events: auto;
    -webkit-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }

  .textLayer span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    -webkit-user-select: text;
    user-select: text;
  }

  /* Suppress native ::selection — we draw our own */
  .textLayer span::selection {
    background: transparent;
    color: transparent;
  }

  /* Highlight overlay canvas — sits above text layer, no pointer events */
  .highlightLayer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 3;
  }

  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="outer">
  <div id="loading">Loading…</div>
  <div id="error"></div>
  <div id="container"></div>
</div>

<script>
(async function () {
  let pdfjsLib;
  try {
    pdfjsLib = await import('./pdf.mjs');
  } catch (e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Failed to load pdf.js: ' + e.message;
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  // Per-page highlight canvases, rebuilt on each PDF load.
  const highlightLayers = [];

  // ── Canvas-drawn selection highlight ─────────────────────────────────────
  //
  // Android WebView's Range.getClientRects() returns the *layout* box of each
  // span (pre-scaleX transform), not the visual bounds.  So we cannot use it
  // directly.
  //
  // Instead we walk the selection Range node-by-node and compute each span's
  // visual rectangle ourselves:
  //
  //   spanLeft  = parseFloat(span.style.left)          (CSS px, set by pdf.js)
  //   spanTop   = parseFloat(span.style.top)           (CSS px)
  //   spanH     = span.offsetHeight                    (CSS px, unscaled)
  //   scaleX    = extracted from span.style.transform  (e.g. "scaleX(1.23)")
  //   fullW     = span.offsetWidth * scaleX            (visual width, CSS px)
  //
  // For partial selections within a span we use a hidden <canvas> to measure
  // character advances with the span's exact font, then scale by scaleX.
  //
  // All coordinates are in the page-wrapper's local CSS-pixel space, which
  // matches the highlightLayer canvas coordinate space (1:1, no dpr).

  const HIGHLIGHT_COLOR = 'rgba(0, 120, 255, 0.35)';

  // Reusable off-screen canvas for text measurement.
  const measureCanvas = document.createElement('canvas');
  const measureCtx    = measureCanvas.getContext('2d');

  /** Extract the scaleX value from a span's transform style. */
  function getScaleX(span) {
    const t = span.style.transform || '';
    const m = t.match(/scaleX\(([\d.eE+\-]+)\)/);
    return m ? parseFloat(m[1]) : 1;
  }

  /**
   * Given a span and a character offset range [startOff, endOff),
   * return the visual x-start and x-width within the span (in CSS px,
   * already multiplied by scaleX).
   */
  function measureCharRange(span, startOff, endOff) {
    const text = span.textContent;
    measureCtx.font = window.getComputedStyle(span).font;
    const sx = getScaleX(span);
    // Width of text before startOff
    const xStart = measureCtx.measureText(text.slice(0, startOff)).width * sx;
    // Width of text before endOff
    const xEnd   = measureCtx.measureText(text.slice(0, endOff)).width   * sx;
    return { xStart, width: xEnd - xStart };
  }

  /**
   * Return an array of { x, y, w, h } rects (in page-wrapper local CSS px)
   * for the given selection Range.
   */
  function computeHighlightRects(range) {
    const rects = [];

    // Collect all text-layer spans that intersect the range.
    // We use a TreeWalker over the range's common ancestor.
    const ancestor = range.commonAncestorContainer;
    const root = ancestor.nodeType === Node.TEXT_NODE
      ? ancestor.parentElement
      : ancestor;

    // Walk all text nodes within the range.
    const walker = document.createTreeWalker(
      root.closest('.textLayer') || root,
      NodeFilter.SHOW_TEXT,
      null
    );

    let node;
    while ((node = walker.nextNode())) {
      // Check if this text node is within the range.
      const nodeRange = document.createRange();
      nodeRange.selectNode(node);
      if (range.compareBoundaryPoints(Range.END_TO_START, nodeRange) >= 0) continue;
      if (range.compareBoundaryPoints(Range.START_TO_END, nodeRange) <= 0) continue;

      const span = node.parentElement;
      if (!span || !span.closest('.textLayer')) continue;

      const text     = node.textContent;
      const startOff = (node === range.startContainer) ? range.startOffset : 0;
      const endOff   = (node === range.endContainer)   ? range.endOffset   : text.length;

      if (startOff >= endOff) continue;

      // Span position in page-wrapper local coords (set by pdf.js as px values).
      const spanLeft = parseFloat(span.style.left) || 0;
      const spanTop  = parseFloat(span.style.top)  || 0;
      const spanH    = span.offsetHeight;
      const sx       = getScaleX(span);

      const { xStart, width } = measureCharRange(span, startOff, endOff);

      rects.push({
        x: spanLeft + xStart,
        y: spanTop,
        w: width,
        h: spanH,
      });
    }

    return rects;
  }

  function clearHighlights() {
    for (const { canvas, ctx } of highlightLayers) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function drawHighlight() {
    clearHighlights();

    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

    const range = sel.getRangeAt(0);

    // Find which page-wrapper the selection starts in.
    // We draw on the highlight canvas of each page that contains selected spans.
    const rects = computeHighlightRects(range);
    if (rects.length === 0) return;

    // Each highlightLayer canvas covers exactly one page-wrapper.
    // The canvas coordinate space = page-wrapper local CSS px (top-left = 0,0).
    // computeHighlightRects already returns coords in page-wrapper local space
    // IF the span's style.left/top are relative to the page-wrapper.
    // pdf.js sets span positions relative to the textLayer div, which is
    // absolutely positioned at (0,0) within the page-wrapper — so they are
    // already in page-wrapper local space.

    // Find the page-wrapper that contains the selection's start node.
    const startNode = range.startContainer;
    const startEl   = startNode.nodeType === Node.TEXT_NODE
      ? startNode.parentElement
      : startNode;
    const wrapper   = startEl.closest('.page-wrapper');

    if (!wrapper) return;

    // Find the highlight canvas for this wrapper.
    const hlCanvas = wrapper.querySelector('.highlightLayer');
    if (!hlCanvas) return;

    const ctx = hlCanvas.getContext('2d');
    ctx.fillStyle = HIGHLIGHT_COLOR;
    for (const { x, y, w, h } of rects) {
      ctx.fillRect(x, y, w, h);
    }
  }

  document.addEventListener('selectionchange', drawHighlight);

  // ─────────────────────────────────────────────────────────────────────────

  window.loadPdf = async function (fileUrl) {
    window.scrollTo(0, 0);
    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';
    highlightLayers.length  = 0;

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const dpr           = window.devicePixelRatio || 1;
      const viewportWidth = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale    = viewportWidth / viewport.width;
        const sv       = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = sv.width  + 'px';
        wrapper.style.height = sv.height + 'px';

        // ── PDF canvas (hi-DPI) ──
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        canvas.width  = Math.floor(sv.width  * dpr);
        canvas.height = Math.floor(sv.height * dpr);
        canvas.style.width  = sv.width  + 'px';
        canvas.style.height = sv.height + 'px';
        await page.render({
          canvasContext: ctx,
          viewport: page.getViewport({ scale: scale * dpr }),
        }).promise;

        // ── Text layer ──
        // viewport.scale = scale/dpr → TextLayer#scale = (scale/dpr)*dpr = scale
        // so scaleX values are correct for CSS-pixel measurements.
        // --scale-factor = scale so setLayerDimensions sizes the container correctly.
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        textLayerDiv.style.setProperty('--scale-factor', String(scale));

        const textContent  = await page.getTextContent();
        const textLayerVp  = page.getViewport({ scale: scale / dpr });
        const textLayer    = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: textLayerVp,
        });
        await textLayer.render();

        // ── Highlight overlay canvas (CSS-pixel size, 1:1) ──
        // No dpr multiplication: canvas coords must match page-wrapper local CSS px.
        const hlCanvas = document.createElement('canvas');
        hlCanvas.className    = 'highlightLayer';
        hlCanvas.width        = Math.floor(sv.width);
        hlCanvas.height       = Math.floor(sv.height);
        hlCanvas.style.width  = sv.width  + 'px';
        hlCanvas.style.height = sv.height + 'px';
        highlightLayers.push({ canvas: hlCanvas, ctx: hlCanvas.getContext('2d') });

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        wrapper.appendChild(hlCanvas);
        container.appendChild(wrapper);
      }

      if (window.Android) window.Android.onPdfLoaded(pdf.numPages);

    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) window.Android.onPdfError(err.message || String(err));
    }
  };

  if (window.Android) window.Android.onViewerReady();
})();
</script>
</body>
</html>

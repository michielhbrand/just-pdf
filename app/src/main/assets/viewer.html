<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
<title>JustPdf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    background: #1a1a1a;
    /* Allow WebView text selection */
    -webkit-user-select: text;
    user-select: text;
  }

  body {
    background: #1a1a1a;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Centre content vertically when shorter than the viewport */
    justify-content: center;
  }

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 8px 0 80px 0; /* bottom padding clears the toolbar */
  }

  /* ── Page wrapper ── */
  .page-wrapper {
    position: relative;
    margin: 4px 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    /* Clip text layer to page bounds */
    overflow: hidden;
  }

  /* Canvas sits behind the text layer */
  .page-wrapper canvas {
    display: block;
    /* IMPORTANT: pointer-events none so touches reach the text layer */
    pointer-events: none;
  }

  /* ── Text layer (pdf.js) ── */
  .textLayer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    line-height: 1;
    /* z-index above canvas so it receives touch events */
    z-index: 2;
    /* Enable text selection */
    -webkit-user-select: text;
    user-select: text;
    pointer-events: auto;
  }

  .textLayer span,
  .textLayer br {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
    /* Each span must also be selectable */
    -webkit-user-select: text;
    user-select: text;
  }

  /* Highlight selected text */
  .textLayer span::selection,
  .textLayer ::selection {
    background: rgba(0, 120, 255, 0.35);
    color: transparent;
  }

  /* ── Loading indicator ── */
  #loading {
    color: #aaa;
    font-family: sans-serif;
    font-size: 16px;
    padding: 40px;
    text-align: center;
  }

  /* ── Error message ── */
  #error {
    display: none;
    color: #ff6b6b;
    font-family: sans-serif;
    font-size: 14px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="error"></div>
<div id="container"></div>

<script type="module">
  import * as pdfjsLib from './pdf.mjs';

  pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.mjs';

  const container = document.getElementById('container');
  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error');

  window.loadPdf = async function(fileUrl) {
    loadingEl.style.display = 'block';
    errorEl.style.display   = 'none';
    container.innerHTML     = '';

    try {
      const pdf = await pdfjsLib.getDocument({
        url: fileUrl,
        disableStream: true,
        disableAutoFetch: true,
      }).promise;

      loadingEl.style.display = 'none';

      const devicePixelRatio = window.devicePixelRatio || 1;
      const viewportWidth    = window.innerWidth;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page     = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });

        // Scale so the page fills the screen width exactly
        const scale          = viewportWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale });

        // ── Wrapper ──
        const wrapper = document.createElement('div');
        wrapper.className    = 'page-wrapper';
        wrapper.style.width  = scaledViewport.width  + 'px';
        wrapper.style.height = scaledViewport.height + 'px';

        // ── Canvas (hi-DPI) ──
        const canvas  = document.createElement('canvas');
        const ctx     = canvas.getContext('2d');
        canvas.width  = Math.floor(scaledViewport.width  * devicePixelRatio);
        canvas.height = Math.floor(scaledViewport.height * devicePixelRatio);
        canvas.style.width  = scaledViewport.width  + 'px';
        canvas.style.height = scaledViewport.height + 'px';

        const hiDpiViewport = page.getViewport({ scale: scale * devicePixelRatio });
        await page.render({ canvasContext: ctx, viewport: hiDpiViewport }).promise;

        // ── Text layer ──
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';

        const textContent = await page.getTextContent();

        // pdf.js v4 TextLayer API
        const textLayer = new pdfjsLib.TextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: scaledViewport,
        });
        await textLayer.render();

        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        container.appendChild(wrapper);
      }

      // Notify Android of the page count
      if (window.Android) {
        window.Android.onPdfLoaded(pdf.numPages);
      }
    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display   = 'block';
      errorEl.textContent     = 'Could not open PDF: ' + err.message;
      console.error(err);
      if (window.Android) {
        window.Android.onPdfError(err.message || String(err));
      }
    }
  };

  // Signal to Android that the viewer is ready
  if (window.Android) {
    window.Android.onViewerReady();
  }
</script>
</body>
</html>
